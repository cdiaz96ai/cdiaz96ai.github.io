<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Carlota Díaz — AI Art Direction</title>

<link href="https://fonts.googleapis.com/css2?family=Inter&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body { scroll-behavior: smooth; }

.text-display-xl {
  font-size: 8rem;
  letter-spacing: -0.04em;
  line-height: 0.9;
}

@media (max-width: 768px) {
  .text-display-xl { font-size: 4rem; }
}

/* 🔥 cursor refinado */
.cursor-image {
  position: fixed;
  width: 150px;
  height: 200px;
  pointer-events: none;
  z-index: 100;
  opacity: 0;
  transform: scale(0.95);
  transition: opacity 0.35s ease, transform 0.35s ease;
}
</style>
</head>

<body class="bg-[#f9f9f9] text-black">

<nav class="fixed top-0 w-full z-50 bg-[#f9f9f9]/80 backdrop-blur-xl flex justify-between px-8 py-6">

<div class="flex gap-6">
<a href="#work">Work</a>
<a href="#about">About</a>
<a href="#contact">Contact</a>
</div>
</nav>

<main>

<section id="hero" class="min-h-screen flex flex-col items-center justify-center">
<h1 class="text-display-xl font-extrabold uppercase">Carlota Díaz</h1>
<p class="mt-4 uppercase tracking-widest">Art Director — AI</p>
</section>

<section id="work" class="py-40 px-8">Work</section>
<section id="about" class="py-40 px-8">About</section>

</section>

<footer class="py-20 px-8">© Carlota Díaz</footer>

<script>
const images = [
  "https://lh3.googleusercontent.com/aida-public/AB6AXuBc8RdO0a-FZLxegTA-LfjaB2GqTrE3OBlrOFTxlWbbgibvjnqq9LBj-JuXrXJMZ9ojH-mJqtBoU0f-Dc33EAjU7EbvVZGcrGVIDBgxRbaBvXa7lrpq34GblmFb9TOmNKz46EKX1-8-Ral2ohYvvSoDQ6Oecb24ttydT8CvuytN33kXdd7ZjXEIcssBLfr5iCnn9SXcWV6tkteDMnnJmwGOARzCwmcLGxbvMRnxDs_oiaJZNh68DV6jLwxw_os9aXk6w6lVdBGs9EE",
  "https://lh3.googleusercontent.com/aida-public/AB6AXuBYWl1c3ILTLcUlVRT22MnZ9vo71Uc_WTgsDZdtwA-WmkjmUr3e32tEGhJZuCfdTFVClCW2r40L2M3sR0ctBFgDiCA7KrQyxN6_weCCoTevat-kI3xOh8_epnwGgyVqeQosd5e5Xx3KshiA0y_6ZbzssN1LlBSyi1PMPSDI_noX6b25ws1jRcJxzcZbo652uT1yr-z42chVSwsEwm9aXufOLa6qZk9zX9Iw0S3pEzNX5Gex4ne0IpGYZ2mNNtNErYJnWC1OntrqtEQ",
  "https://lh3.googleusercontent.com/aida-public/AB6AXuD5apwWXgN2Kp2lfA7Nje1FNB3_7yYiqn07SHdnGlWlEKF_L5YWWwpp2vtu6VS_2q-Mj4UDMYW1-f580VKY67tf_GQrAewvf8jD0Onsq5Z9ow86S7otBE97mClBVbBzkj_QOZqK5ENhpcUJBcQibd7M0iK5MnSZG5bekubIhhvKcOBrnuERN7-yishRTKxEOKowFU1jFRcWsd4xb7whxkB35N9u2iRsv1Bpa1Q8Jcf0TtLfHqosfx8tK_lbu-LFIn8M3LNdqv__s2g"
];

let currentIndex = 0;
let lastMove = 0;

const hero = document.querySelector("#hero");

hero.addEventListener("mousemove", (e) => {
  const now = Date.now();

  if (now - lastMove < 140) return;
  lastMove = now;

  const img = document.createElement("img");
  img.src = images[currentIndex];
  img.className = "cursor-image";

  document.body.appendChild(img);

  // 🔥 más pegado al cursor
  img.style.left = (e.clientX + 5) + "px";
  img.style.top = (e.clientY + 5) + "px";

  requestAnimationFrame(() => {
    img.style.opacity = "1";
    img.style.transform = "scale(1)";
  });

  setTimeout(() => {
    img.style.opacity = "0";
    img.style.transform = "scale(0.95)";
    setTimeout(() => img.remove(), 300);
  }, 750);

  currentIndex = (currentIndex + 1) % images.length;
});
</script>

</body>
</html>
