<!DOCTYPE html>
<html class="light" lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="description" content="Carlota Díaz — Art Director especializada en IA. Portfolio de proyectos seleccionados."/>
<meta property="og:title" content="Carlota Díaz — AI Art Direction"/>
<meta property="og:description" content="Art Director especializada en IA. Portfolio de proyectos seleccionados."/>
<meta property="og:type" content="website"/>
<title>Carlota Díaz — AI Art Direction</title>
<link href="https://fonts.googleapis.com/css2?family=Inter&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script>
<style>
* { box-sizing: border-box; }
html, body {
  margin: 0;
  padding: 0;
  overflow-x: hidden;
}
body {
  font-family: 'Inter', sans-serif;
  background: #f9f9f9;
  color: black;
}

/* Rail invisible que da altura para el scroll */
#scroll-track {
  position: relative;
  z-index: 0;
}

/* Stage fijo — siempre 100vw × 100vh */
#stage {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
}

/* Todos los paneles se apilan en el mismo sitio */
.panel {
  position: absolute;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
}

/* ─── HERO ─── */
#hero {
  z-index: 1;
  background: #f9f9f9;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}
#hero-inner {
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  width: 100%;
  height: 100%;
  will-change: filter;
}
.text-display-xl {
  font-size: 8rem;
  letter-spacing: -0.04em;
  line-height: 0.9;
  font-weight: 900;
  text-transform: uppercase;
}
@media (max-width: 768px) {
  .text-display-xl { font-size: 4rem; }
}

/* ─── WORK ─── */
#work {
  z-index: 2;
  background: #ffffff;
  display: flex;
  flex-direction: column;
  padding: 80px 60px;
  /* empieza fuera a la derecha */
  transform: translateX(100vw);
  will-change: transform, filter;
}
#work::before {
  content: "";
  position: absolute;
  top: 0; left: 0;
  width: 0.5px; height: 100%;
  background: rgba(0,0,0,0.3);
}

/* ─── ABOUT ─── */
#about {
  z-index: 3;
  background: #f9f9f9;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 80px 60px;
  transform: translateX(100vw);
  will-change: transform, filter;
}
#about::before {
  content: "";
  position: absolute;
  top: 0; left: 0;
  width: 0.5px; height: 100%;
  background: rgba(0,0,0,0.3);
}

/* ─── CONTACT ─── */
#contact {
  z-index: 4;
  background: #f9f9f9;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  transform: translateX(100vw);
  will-change: transform;
}
#contact::before {
  content: "";
  position: absolute;
  top: 0; left: 0;
  width: 0.5px; height: 100%;
  background: rgba(0,0,0,0.3);
}

/* ─── WORK GRID — cabe en 100vh sin scroll ─── */
#work-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  grid-template-rows: repeat(2, 1fr);
  gap: 10px;
  flex: 1;
  min-height: 0; /* clave para que no desborde */
  max-width: 780px;
}
#work-grid > div {
  background: #e0e0e0;
  border-radius: 4px;
  min-height: 0;
}

/* ─── CURSOR IMAGES ─── */
.cursor-image {
  position: absolute;
  width: 150px;
  height: 200px;
  pointer-events: none;
  z-index: 5;
  opacity: 0;
  transform: scale(0.95);
  transition: opacity 0.35s ease, transform 0.35s ease;
  object-fit: cover;
}

/* ─── NAV ─── */
nav {
  position: fixed;
  top: 0;
  width: 100%;
  z-index: 100;
  background: rgba(249,249,249,0.8);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 24px 32px;
}
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <div style="font-weight: 700;">Carlota Díaz</div>
  <div style="display: flex; gap: 24px;">
    <a href="#work"    style="text-decoration: none; color: inherit;">Work</a>
    <a href="#about"   style="text-decoration: none; color: inherit;">About</a>
    <a href="#contact" style="text-decoration: none; color: inherit;">Contact</a>
  </div>
</nav>

<!-- SCROLL TRACK -->
<div id="scroll-track"></div>

<!-- STAGE -->
<div id="stage">

  <!-- 0: HERO -->
  <div id="hero" class="panel">
    <div id="hero-inner">
      <h1 class="text-display-xl">Carlota Díaz</h1>
      <p style="margin-top: 16px; text-transform: uppercase; letter-spacing: 0.2em; font-size: 0.85rem;">Art Director — AI</p>
    </div>
  </div>

  <!-- 1: WORK -->
  <div id="work" class="panel">
    <h2 style="font-size: 2.25rem; font-weight: 700; margin-bottom: 28px; flex-shrink: 0;">Selected Works</h2>
    <div id="work-grid">
      <div></div><div></div><div></div>
      <div></div><div></div><div></div>
    </div>
  </div>

  <!-- 2: ABOUT -->
  <div id="about" class="panel">
    <h2 style="font-size: 2.25rem; font-weight: 700; margin-bottom: 40px;">About</h2>
    <p style="max-width: 520px; line-height: 1.7; color: #333;">Contenido about...</p>
  </div>

  <!-- 3: CONTACT -->
  <div id="contact" class="panel">
    <a href="mailto:hello@carlotadiaz.ai"
       style="font-size: 2rem; font-weight: 700; text-decoration: none; color: inherit; border-bottom: 2px solid black; padding-bottom: 4px;">
      hello@carlotadiaz.ai
    </a>
    <p style="margin-top: 24px; opacity: 0.4; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.15em;">© Carlota Díaz</p>
  </div>

</div>

<script>
  // ─── ELEMENTOS ────────────────────────────────────────────────────────────
  const heroInner = document.getElementById('hero-inner');
  const heroPanel = document.getElementById('hero');
  const workEl    = document.getElementById('work');
  const aboutEl   = document.getElementById('about');
  const contactEl = document.getElementById('contact');
  const scrollTrack = document.getElementById('scroll-track');

  // Cada sección tiene 1vw de "dwell" + la transición dura 0.5vw
  // Estructura del scroll:
  //  [0 → 0.5vw]   work entra, hero se borrosa
  //  [1vw → 1.5vw] about entra, work se borrosa
  //  [2vw → 2.5vw] contact entra, about se borrosa
  //  Total: 3vw + vh de rail
  const TRANS = 0.5; // fracción de vw que dura cada transición

  function setTrackHeight() {
    scrollTrack.style.height = (3 * window.innerWidth + window.innerHeight) + 'px';
  }
  setTrackHeight();
  window.addEventListener('resize', setTrackHeight);

  function clamp(v, lo, hi) { return Math.min(Math.max(v, lo), hi); }

  let targetScroll = 0, currentScroll = 0, animating = false;

  window.addEventListener('scroll', () => {
    targetScroll = window.scrollY;
    if (!animating) { animating = true; requestAnimationFrame(animate); }
  });

  function animate() {
    currentScroll += (targetScroll - currentScroll) * 0.08;

    const s = currentScroll;
    const W = window.innerWidth;
    const T = TRANS * W;

    // — work desliza sobre hero —
    const wP = clamp(s / T, 0, 1);
    workEl.style.transform   = `translateX(${(1 - wP) * 100}vw)`;
    heroInner.style.filter   = `blur(${wP * 18}px)`;

    // — about desliza sobre work —
    const aP = clamp((s - W) / T, 0, 1);
    aboutEl.style.transform  = `translateX(${(1 - aP) * 100}vw)`;
    workEl.style.filter      = `blur(${aP * 18}px)`;

    // — contact desliza sobre about —
    const cP = clamp((s - 2 * W) / T, 0, 1);
    contactEl.style.transform = `translateX(${(1 - cP) * 100}vw)`;
    aboutEl.style.filter      = `blur(${cP * 18}px)`;

    if (Math.abs(targetScroll - currentScroll) > 0.5) {
      requestAnimationFrame(animate);
    } else {
      animating = false;
    }
  }

  // ─── NAV LINKS ────────────────────────────────────────────────────────────
  const sectionMap = { work: 1, about: 2, contact: 3 };
  document.querySelectorAll('nav a[href^="#"]').forEach(link => {
    link.addEventListener('click', e => {
      e.preventDefault();
      const id  = link.getAttribute('href').slice(1);
      const idx = sectionMap[id];
      if (idx !== undefined) {
        window.scrollTo({ top: idx * window.innerWidth, behavior: 'smooth' });
      }
    });
  });

  // ─── CURSOR IMAGES EN HERO ────────────────────────────────────────────────
  const imageSrcs = [
    "https://lh3.googleusercontent.com/aida-public/AB6AXuBc8RdO0a-FZLxegTA-LfjaB2GqTrE3OBlrOFTxlWbbgibvjnqq9LBj-JuXrXJMZ9ojH-mJqtBoU0f-Dc33EAjU7EbvVZGcrGVIDBgxRbaBvXa7lrpq34GblmFb9TOmNKz46EKX1-8-Ral2ohYvvSoDQ6Oecb24ttydT8CvuytN33kXdd7ZjXEIcssBLfr5iCnn9SXcWV6tkteDMnnJmwGOARzCwmcLGxbvMRnxDs_oiaJZNh68DV6jLwxw_os9aXk6w6lVdBGs9EE",
    "https://lh3.googleusercontent.com/aida-public/AB6AXuBYWl1c3ILTLcUlVRT22MnZ9vo71Uc_WTgsDZdtwA-WmkjmUr3e32tEGhJZuCfdTFVClCW2r40L2M3sR0ctBFgDiCA7KrQyxN6_weCCoTevat-kI3xOh8_epnwGgyVqeQosd5e5Xx3KshiA0y_6ZbzssN1LlBSyi1PMPSDI_noX6b25ws1jRcJxzcZbo652uT1yr-z42chVSwsEwm9aXufOLa6qZk9zX9Iw0S3pEzNX5Gex4ne0IpGYZ2mNNtNErYJnWC1OntrqtEQ",
    "https://lh3.googleusercontent.com/aida-public/AB6AXuD5apwWXgN2Kp2lfA7Nje1FNB3_7yYiqn07SHdnGlWlEKF_L5YWWwpp2vtu6VS_2q-Mj4UDMYW1-f580VKY67tf_GQrAewvf8jD0Onsq5Z9ow86S7otBE97mClBVbBzkj_QOZqK5ENhpcUJBcQibd7M0iK5MnSZG5bekubIhhvKcOBrnuERN7-yishRTKxEOKowFU1jFRcWsd4xb7whxkB35N9u2iRsv1Bpa1Q8Jcf0TtLfHqosfx8tK_lbu-LFIn8M3LNdqv__s2g"
  ];

  const imagePool = imageSrcs.map(src => {
    const img = new Image();
    img.src = src;
    img.className = "cursor-image";
    return img;
  });

  let currentIndex = 0, lastMove = 0;

  heroPanel.addEventListener('mousemove', e => {
    const now = Date.now();
    if (now - lastMove < 140) return;
    if (window.scrollY > window.innerWidth * 0.2) return;
    lastMove = now;

    const rect = heroPanel.getBoundingClientRect();
    const img  = imagePool[currentIndex].cloneNode();
    heroPanel.appendChild(img);
    img.style.left = (e.clientX - rect.left) + 'px';
    img.style.top  = (e.clientY - rect.top)  + 'px';

    requestAnimationFrame(() => {
      img.style.opacity   = '1';
      img.style.transform = 'scale(1)';
    });
    setTimeout(() => {
      img.style.opacity   = '0';
      img.style.transform = 'scale(0.95)';
      setTimeout(() => img.remove(), 300);
    }, 750);

    currentIndex = (currentIndex + 1) % imagePool.length;
  });
</script>
</body>
</html>
