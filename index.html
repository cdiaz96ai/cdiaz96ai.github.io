<!DOCTYPE html>
<html class="dark" lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="description" content="Carlota Díaz — Art Director especializada en IA. Portfolio de proyectos seleccionados."/>
<meta property="og:title" content="Carlota Díaz — AI Art Direction"/>

<title>Carlota Díaz — AI Art Direction</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Grotesk:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #0a0a0a;
  --bg-alt:   #111111;
  --text:     #f0f0f0;
  --muted:    rgba(240,240,240,0.4);
  --line:     rgba(240,240,240,0.12);
  --grid-bg:  #1c1c1c;
  --accent:   #E8571A;
}

html, body {
  overflow-x: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: 'Space Grotesk', sans-serif;
}

/* ─── SCROLL TRACK ─── */
#scroll-track { position: relative; z-index: 0; }

/* ─── STAGE ─── */
#stage {
  position: fixed;
  top: 0; left: 0;
  width: 100vw;
  height: 100vh;
}

.panel {
  position: absolute;
  top: 0; left: 0;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
}

/* ─── HERO ─── */
#hero {
  z-index: 1;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}
#hero-inner {
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  width: 100%; height: 100%;
  will-change: filter;
}
.text-display-xl {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 8rem;
  letter-spacing: -0.04em;
  line-height: 0.88;
  text-transform: uppercase;
  color: var(--text);
}
.hero-sub {
  margin-top: 20px;
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 300;
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.3em;
  color: var(--accent);
}
@media (max-width: 768px) {
  .text-display-xl { font-size: 4rem; }
}

/* ─── WORK ─── */
#work {
  z-index: 2;
  background: var(--bg-alt);
  display: flex;
  flex-direction: column;
  padding: 80px 64px;
  transform: translateX(100vw);
  will-change: transform, filter;
}
#work::before {
  content: "";
  position: absolute;
  top: 0; left: 0;
  width: 0.5px; height: 100%;
  background: var(--line);
}

/* ─── ABOUT ─── */
#about {
  z-index: 3;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 80px 64px;
  transform: translateX(100vw);
  will-change: transform, filter;
}
#about::before {
  content: "";
  position: absolute;
  top: 0; left: 0;
  width: 0.5px; height: 100%;
  background: var(--line);
}

/* ─── CONTACT ─── */
#contact {
  z-index: 4;
  background: var(--bg-alt);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  transform: translateX(100vw);
  will-change: transform;
}
#contact::before {
  content: "";
  position: absolute;
  top: 0; left: 0;
  width: 0.5px; height: 100%;
  background: var(--line);
}

/* ─── SECTION HEADINGS ─── */
.section-heading {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 0.25em;
  color: var(--muted);
  margin-bottom: 40px;
  flex-shrink: 0;
}

/* ─── WORK GRID ─── */
#work-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-template-rows: repeat(2, 1fr);
  gap: 8px;
  flex: 1;
  min-height: 0;
  width: 100%;
}
#work-grid > div {
  background: var(--grid-bg);
  border-radius: 2px;
  min-height: 0;
  transition: background 0.3s ease;
}
#work-grid > div:hover {
  background: #2a2a2a;
  outline: 1px solid rgba(232, 87, 26, 0.35);
}

/* ─── ABOUT TEXT ─── */
.about-text {
  max-width: 480px;
  font-size: 1.05rem;
  line-height: 1.8;
  font-weight: 300;
  color: rgba(240,240,240,0.75);
}

/* ─── CONTACT LINK ─── */
.contact-link {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: clamp(1.2rem, 3vw, 2.2rem);
  text-decoration: none;
  color: var(--text);
  border-bottom: 1px solid var(--line);
  padding-bottom: 6px;
  transition: border-color 0.3s ease, color 0.3s ease;
  letter-spacing: -0.02em;
}
.contact-link:hover {
  color: var(--accent);
  border-color: var(--accent);
}
.contact-footer {
  margin-top: 28px;
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.2em;
  color: var(--muted);
}

/* ─── CURSOR IMAGES ─── */
.cursor-image {
  position: absolute;
  width: 150px;
  height: 200px;
  pointer-events: none;
  z-index: 5;
  opacity: 0;
  transform: scale(0.95);
  transition: opacity 0.4s ease, transform 0.4s ease;
  object-fit: cover;
  border-radius: 2px;
}

/* ─── NAV ─── */
nav {
  position: fixed;
  top: 0; width: 100%;
  z-index: 100;
  background: rgba(10,10,10,0.7);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 22px 32px;
  border-bottom: 0.5px solid var(--line);
}
.nav-logo {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 0.9rem;
  letter-spacing: 0.02em;
  color: var(--text);
}
.nav-links {
  display: flex;
  gap: 28px;
}
.nav-links a {
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  text-decoration: none;
  color: var(--muted);
  transition: color 0.3s ease;
}
.nav-links a:hover { color: var(--accent); }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-logo">Carlota Díaz</div>
  <div class="nav-links">
    <a href="#work">Work</a>
    <a href="#about">About</a>
    <a href="#contact">Contact</a>
  </div>
</nav>

<!-- SCROLL TRACK -->
<div id="scroll-track"></div>

<!-- STAGE -->
<div id="stage">

  <!-- 0: HERO -->
  <div id="hero" class="panel">
    <div id="hero-inner">
      <h1 class="text-display-xl">Carlota Díaz</h1>
      <p class="hero-sub">Art Director — AI</p>
    </div>
  </div>

  <!-- 1: WORK -->
  <div id="work" class="panel">
    <p class="section-heading">Selected Works</p>
    <div id="work-grid">
      <div></div><div></div><div></div><div></div>
      <div></div><div></div><div></div><div></div>
    </div>
  </div>

  <!-- 2: ABOUT -->
  <div id="about" class="panel">
    <p class="section-heading">About</p>
    <p class="about-text">Contenido about...</p>
  </div>

  <!-- 3: CONTACT -->
  <div id="contact" class="panel">
    <a class="contact-link" href="mailto:hello@carlotadiaz.ai">hello@carlotadiaz.ai</a>
    <p class="contact-footer">© Carlota Díaz</p>
  </div>

</div>

<script>
  const heroInner  = document.getElementById('hero-inner');
  const heroPanel  = document.getElementById('hero');
  const workEl     = document.getElementById('work');
  const aboutEl    = document.getElementById('about');
  const contactEl  = document.getElementById('contact');
  const scrollTrack = document.getElementById('scroll-track');

  // Duración de cada transición: 0.65 × vw (más lenta y fluida)
  const TRANS = 0.65;

  function setTrackHeight() {
    scrollTrack.style.height = (3 * window.innerWidth + window.innerHeight) + 'px';
  }
  setTrackHeight();
  window.addEventListener('resize', setTrackHeight);

  function clamp(v, lo, hi) { return Math.min(Math.max(v, lo), hi); }

  let targetScroll = 0, currentScroll = 0, animating = false;

  window.addEventListener('scroll', () => {
    targetScroll = window.scrollY;
    if (!animating) { animating = true; requestAnimationFrame(animate); }
  });

  function animate() {
    // Lerp más lento → sensación más lujosa (0.05 en lugar de 0.08)
    currentScroll += (targetScroll - currentScroll) * 0.05;

    const s = currentScroll;
    const W = window.innerWidth;
    const T = TRANS * W;

    // work desliza sobre hero
    const wP = clamp(s / T, 0, 1);
    workEl.style.transform  = `translateX(${(1 - wP) * 100}vw)`;
    heroInner.style.filter  = `blur(${wP * 16}px)`;

    // about desliza sobre work
    const aP = clamp((s - W) / T, 0, 1);
    aboutEl.style.transform = `translateX(${(1 - aP) * 100}vw)`;
    workEl.style.filter     = `blur(${aP * 16}px)`;

    // contact desliza sobre about
    const cP = clamp((s - 2 * W) / T, 0, 1);
    contactEl.style.transform = `translateX(${(1 - cP) * 100}vw)`;
    aboutEl.style.filter      = `blur(${cP * 16}px)`;

    if (Math.abs(targetScroll - currentScroll) > 0.3) {
      requestAnimationFrame(animate);
    } else {
      animating = false;
    }
  }

  // NAV LINKS
  const sectionMap = { work: 1, about: 2, contact: 3 };
  document.querySelectorAll('nav a[href^="#"]').forEach(link => {
    link.addEventListener('click', e => {
      e.preventDefault();
      const id  = link.getAttribute('href').slice(1);
      const idx = sectionMap[id];
      if (idx !== undefined) {
        window.scrollTo({ top: idx * window.innerWidth, behavior: 'smooth' });
      }
    });
  });

  // CURSOR IMAGES EN HERO
  const imageSrcs = [
    "https://lh3.googleusercontent.com/aida-public/AB6AXuBc8RdO0a-FZLxegTA-LfjaB2GqTrE3OBlrOFTxlWbbgibvjnqq9LBj-JuXrXJMZ9ojH-mJqtBoU0f-Dc33EAjU7EbvVZGcrGVIDBgxRbaBvXa7lrpq34GblmFb9TOmNKz46EKX1-8-Ral2ohYvvSoDQ6Oecb24ttydT8CvuytN33kXdd7ZjXEIcssBLfr5iCnn9SXcWV6tkteDMnnJmwGOARzCwmcLGxbvMRnxDs_oiaJZNh68DV6jLwxw_os9aXk6w6lVdBGs9EE",
    "https://lh3.googleusercontent.com/aida-public/AB6AXuBYWl1c3ILTLcUlVRT22MnZ9vo71Uc_WTgsDZdtwA-WmkjmUr3e32tEGhJZuCfdTFVClCW2r40L2M3sR0ctBFgDiCA7KrQyxN6_weCCoTevat-kI3xOh8_epnwGgyVqeQosd5e5Xx3KshiA0y_6ZbzssN1LlBSyi1PMPSDI_noX6b25ws1jRcJxzcZbo652uT1yr-z42chVSwsEwm9aXufOLa6qZk9zX9Iw0S3pEzNX5Gex4ne0IpGYZ2mNNtNErYJnWC1OntrqtEQ",
    "https://lh3.googleusercontent.com/aida-public/AB6AXuD5apwWXgN2Kp2lfA7Nje1FNB3_7yYiqn07SHdnGlWlEKF_L5YWWwpp2vtu6VS_2q-Mj4UDMYW1-f580VKY67tf_GQrAewvf8jD0Onsq5Z9ow86S7otBE97mClBVbBzkj_QOZqK5ENhpcUJBcQibd7M0iK5MnSZG5bekubIhhvKcOBrnuERN7-yishRTKxEOKowFU1jFRcWsd4xb7whxkB35N9u2iRsv1Bpa1Q8Jcf0TtLfHqosfx8tK_lbu-LFIn8M3LNdqv__s2g"
  ];

  const imagePool = imageSrcs.map(src => {
    const img = new Image();
    img.src = src;
    img.className = "cursor-image";
    return img;
  });

  let currentIndex = 0, lastMove = 0;
